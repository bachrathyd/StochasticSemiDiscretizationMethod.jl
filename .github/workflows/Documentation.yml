name: Documentation
on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}
# Permissions needed for Documenter to deploy to gh-pages via GITHUB_TOKEN
# and to post documentation previews on pull requests.
permissions:
  contents: write
  pull-requests: read
  statuses: write
jobs:
  build:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install documentation dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      # deploy to gh-pages
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}   # optional SSH deploy key
        run: julia --project=docs docs/make.jl
